name: Bug Report
description: Report a bug in MCP Router
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this behavior?
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
  - type: input
    id: version
    attributes:
      label: Version
      description: What version of mcp-router are you using?
  - type: input
    id: python
    attributes:
      label: Python version
      description: Output of `python --version`
